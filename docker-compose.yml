services:
  ollama:
    image: ollama/ollama:latest
    container_name: smarttdg-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: smarttdg-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo 'Pulling models...';
      ollama pull gemma3:latest;
      ollama pull qwen3:latest;
      ollama pull gpt-oss:latest;
      echo 'Model pull complete.'"

  backend:
    image: yourdockerhubname/smarttdg-backend:latest
    container_name: smarttdg-backend
    ports:
      - "5000:5000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ANALYSIS_MODEL: gemma3:latest
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - smarttdg_uploads:/app/flask/backend/uploads
      - smarttdg_final_output:/app/flask/backend/final_output
      - smarttdg_prompts_output:/app/flask/backend/prompts_output
      - smarttdg_analysis_output:/app/flask/backend/analysis_output
      - smarttdg_static_analysis_output:/app/flask/backend/static_analysis_output

volumes:
  ollama_data:
  smarttdg_uploads:
  smarttdg_final_output:
  smarttdg_prompts_output:
  smarttdg_analysis_output:
  smarttdg_static_analysis_output: